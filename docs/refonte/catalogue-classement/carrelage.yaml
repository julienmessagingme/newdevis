references:
  - "DTU 52.1 — Revêtements de sol scellés"
  - "DTU 52.2 — Pose collée des revêtements céramiques"
  - "NF P61-202 — Travaux de bâtiment, revêtements muraux intérieurs"
  - "Capeb 2026 — Prix carrelage rénovation et neuf"
  - "FFB 2026 — Bordereau carrelage"
