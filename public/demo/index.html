<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Démo · Gérer Mon Chantier</title>
  <meta name="description" content="Découvrez Gérer Mon Chantier en 60 secondes : un cockpit qui pilote votre chantier au millimètre." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    #root { position: fixed; inset: 0; }

    .demo-back {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 50;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    .demo-back:hover { background: rgba(255,255,255,0.16); }
    body.embed .demo-back { display: none; }
  </style>
  <script>
    if (location.search.includes('embed=1')) {
      document.documentElement.classList.add('embed');
      document.addEventListener('DOMContentLoaded', () => document.body.classList.add('embed'));
    }
  </script>
  <script src="/demo/vendor/react.production.min.js"></script>
  <script src="/demo/vendor/react-dom.production.min.js"></script>
  <script src="/demo/vendor/babel.min.js"></script>
</head>
<body>
  <a href="/" class="demo-back" aria-label="Retour à l'accueil">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
    Retour
  </a>

  <div id="root"></div>

  <script type="text/babel" src="/demo/animations.jsx"></script>
  <script type="text/babel" src="/demo/video-scenes.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<window.Video />);
  </script>
</body>
</html>
