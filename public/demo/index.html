<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Démo · Gérer Mon Chantier</title>
  <meta name="description" content="Découvrez Gérer Mon Chantier en 40 secondes : un cockpit qui pilote votre chantier au millimètre." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/demo/tokens.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* When loaded inside a modal iframe (?embed=1), the body becomes transparent
       so the parent page's blurred backdrop shows through the letterbox bars. */
    body.embed { background: transparent; }
    body.embed .demo-back { display: none; }
    #root { width: 100%; height: 100%; }

    .demo-back {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 50;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    .demo-back:hover { background: rgba(255,255,255,0.16); }
  </style>
  <script>
    if (location.search.includes('embed=1')) {
      document.documentElement.classList.add('embed');
      document.addEventListener('DOMContentLoaded', () => document.body.classList.add('embed'));
    }
  </script>
  <script src="/demo/vendor/react.production.min.js"></script>
  <script src="/demo/vendor/react-dom.production.min.js"></script>
  <script src="/demo/vendor/babel.min.js"></script>
</head>
<body>
  <a href="/" class="demo-back" data-when="standalone" aria-label="Retour à l'accueil">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
    Retour
  </a>

  <div id="root"></div>

  <script type="text/babel" src="/demo/animations.jsx"></script>
  <script type="text/babel" src="/demo/cockpit-ui.jsx"></script>
  <script type="text/babel" src="/demo/scene-v1.jsx"></script>
  <script type="text/babel" src="/demo/scene-v2.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function DemoPlayer() {
      const W = 1920, H = 1080;
      const isEmbed = typeof location !== 'undefined' && location.search.indexOf('embed=1') !== -1;
      return (
        <div style={{ position: 'absolute', inset: 0, background: isEmbed ? 'transparent' : '#0a0a0a' }}>
          <Stage
            width={W}
            height={H}
            duration={40}
            background={COL.page}
            persistKey="gmc-demo-v2"
            autoplay={true}
            loop={true}
          >
            <SceneV2 w={W} h={H} />
          </Stage>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DemoPlayer />);
  </script>
</body>
</html>
