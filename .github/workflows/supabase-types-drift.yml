name: Supabase Types Drift Check

# Vérifie que src/integrations/supabase/types.ts est à jour avec le schéma Supabase distant.
# Sans ce check, une migration qui ajoute une colonne peut être déployée sans
# régénérer types.ts → la TS compile mais les nouveaux champs sont invisibles
# côté code (silently `undefined` quand on les accède).
#
# Pré-requis : secret SUPABASE_ACCESS_TOKEN configuré dans GitHub Settings →
# Secrets → Actions. Token personnel : https://supabase.com/dashboard/account/tokens
#
# Si la check fail, le dev régénère localement :
#   npx supabase gen types typescript --project-id vhrhgsqxwvouswjaiczn \
#     > src/integrations/supabase/types.ts
# puis commit + push.

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'src/integrations/supabase/types.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Generate types from remote schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not configured — skipping drift check"
            echo "Configure le secret dans GitHub Settings pour activer la vérification."
            exit 0
          fi
          supabase gen types typescript \
            --project-id vhrhgsqxwvouswjaiczn \
            > /tmp/types-fresh.ts

      - name: Compare with committed types.ts
        run: |
          if [ ! -f /tmp/types-fresh.ts ]; then
            echo "Skipped (token missing)"
            exit 0
          fi
          if ! diff -q src/integrations/supabase/types.ts /tmp/types-fresh.ts > /dev/null; then
            echo "::error::Drift détecté entre types.ts committé et le schéma Supabase distant."
            echo ""
            echo "--- Diff (committed → fresh) ---"
            diff src/integrations/supabase/types.ts /tmp/types-fresh.ts | head -80 || true
            echo ""
            echo "Pour fixer :"
            echo "  npx supabase gen types typescript --project-id vhrhgsqxwvouswjaiczn > src/integrations/supabase/types.ts"
            echo "  git add src/integrations/supabase/types.ts && git commit -m 'chore: regen Supabase types' && git push"
            exit 1
          fi
          echo "✅ types.ts à jour avec le schéma distant"
